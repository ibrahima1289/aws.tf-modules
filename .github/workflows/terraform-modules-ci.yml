name: Terraform Modules Checks
# CI workflow to enforce Terraform module hygiene:
# - Only allowed file types in module folders
# - Terraform formatting (fmt -check)
# - Terraform validate on all complete modules
# - Security scanning with checkov and tfsec

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  # Cancel previous runs for the same ref to avoid redundant work
  group: terraform-modules-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-linux:
    name: Validate (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.8'

      - name: Show tool versions
        run: |
          python --version
          terraform -version

      - name: Run Terraform module checks
        run: |
          python tests/terraform_module_check.py

      - name: Terraform validate (all complete modules)
        run: |
          FAILED=0
          for dir in modules/*/*; do
            if [ -f "$dir/main.tf" ] && [ -f "$dir/variables.tf" ] && [ -f "$dir/outputs.tf" ]; then
              echo "Validating $dir ..."
              cd "$dir"
              terraform init -backend=false -input=false -no-color > /dev/null 2>&1
              terraform validate -no-color || FAILED=1
              cd "$GITHUB_WORKSPACE"
            fi
          done
          exit $FAILED

      - name: Install checkov
        run: pip install checkov

      - name: Run checkov security scan
        run: |
          checkov -d modules --framework terraform \
            --quiet \
            --compact \
            --skip-check CKV_TF_1

      - name: Install tfsec
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

      - name: Run tfsec security scan
        run: |
          tfsec modules --no-color --concise-output
